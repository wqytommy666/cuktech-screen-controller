name: Test

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest -v test_quota_dashboard.py test_ap01_prepare_screen.py test_ap01_install_firmware.py test_ap01_wifi_bridge.py
      - run: |
          python ap01_prepare_screen.py docs/images/quota-dashboard-preview.png /tmp/ap01-screen.gif
          python - <<'PY'
          from pathlib import Path
          from PIL import Image
          path = Path('/tmp/ap01-screen.gif')
          with Image.open(path) as image:
              assert image.size == (320, 240)
              assert image.n_frames >= 2
              assert image.info.get('version') == b'GIF89a'
          assert path.stat().st_size <= 221445
          PY

  macos-app:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m venv .venv
      - run: .venv/bin/python -m pip install Pillow
      - run: CUKTECH_PORTABLE=1 CUKTECH_VERSION=0.2.1 CUKTECH_BUILD=3 ./macos/build-app.sh
      - run: codesign --verify --deep --strict 'dist/CUKTECH Screen Controller.app'
      - run: |
          test "$(otool -l 'dist/CUKTECH Screen Controller.app/Contents/MacOS/AP01ScreenController' | awk '/minos/{print $2; exit}')" = "14.0"
          test "$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' 'dist/CUKTECH Screen Controller.app/Contents/Info.plist')" = "14.0"
