name: Test

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest -v test_quota_dashboard.py test_ap01_prepare_screen.py test_ap01_install_firmware.py test_ap01_fds_relay.py test_ap01_wifi_bridge.py test_platform_support.py test_windows_runtime.py
      - run: |
          python ap01_prepare_screen.py docs/images/quota-dashboard-preview.png /tmp/ap01-screen.gif
          python - <<'PY'
          from pathlib import Path
          from PIL import Image
          path = Path('/tmp/ap01-screen.gif')
          with Image.open(path) as image:
              assert image.size == (320, 240)
              assert image.n_frames >= 2
              assert image.info.get('version') == b'GIF89a'
          assert path.stat().st_size <= 221445
          PY

  windows-python:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up the Windows toolkit and render a sample
        shell: powershell
        run: |
          Set-ExecutionPolicy -Scope Process Bypass
          .\scripts\setup-windows.ps1 -App -NoLaunch -InputImage ".\docs\images\quota-dashboard-preview.png"
      - name: Run the cross-platform Python tests
        shell: powershell
        run: |
          .\.venv\Scripts\python.exe -m unittest -v test_quota_dashboard.py test_ap01_prepare_screen.py test_ap01_install_firmware.py test_ap01_fds_relay.py test_ap01_wifi_bridge.py test_platform_support.py test_windows_runtime.py
      - name: Smoke-test the Windows UI modules
        shell: powershell
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          .\.venv\Scripts\python.exe -c "from PySide6.QtWidgets import QApplication; from windows.ui import MainWindow; from windows.runtime import AppPaths; print('Windows UI imports successfully')"
      - name: Validate the Windows-generated AP01 GIF
        shell: powershell
        run: |
          .\.venv\Scripts\python.exe -c "from pathlib import Path; from PIL import Image; p=Path('artifacts/custom-screen.gif'); im=Image.open(p); assert im.size == (320, 240); assert im.n_frames >= 2; assert im.info.get('version') == b'GIF89a'; assert p.stat().st_size <= 221445"

  windows-app:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build the native Windows application
        shell: powershell
        run: .\windows\build-app.ps1 -Version 0.4.0
      - name: Package the Windows installer ZIP
        shell: powershell
        run: .\windows\package-release.ps1 -Version 0.4.0 -SkipBuild
      - uses: actions/upload-artifact@v4
        with:
          name: CUKTECH-Screen-Controller-Windows-x64
          path: |
            dist/CUKTECH-Screen-Controller-0.4.0-Windows-x64.zip
            dist/CUKTECH-Screen-Controller-0.4.0-Windows-x64.zip.sha256

  macos-app:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m venv .venv
      - run: .venv/bin/python -m pip install Pillow
      - run: CUKTECH_PORTABLE=1 CUKTECH_VERSION=0.4.0 CUKTECH_BUILD=6 ./macos/build-app.sh
      - run: codesign --verify --deep --strict 'dist/CUKTECH Screen Controller.app'
      - run: |
          test "$(otool -l 'dist/CUKTECH Screen Controller.app/Contents/MacOS/AP01ScreenController' | awk '/minos/{print $2; exit}')" = "14.0"
          test "$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' 'dist/CUKTECH Screen Controller.app/Contents/Info.plist')" = "14.0"
